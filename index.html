<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNGADRAKEN Desktop</title>
    <meta name="description" content="UNGADRAKEN portfolio desktop." />
    <style>
      :root {
        --desktop-sky: #5ea2ff;
        --desktop-sky-dark: #2d68cf;
        --desktop-hill: #7fbe2d;
        --desktop-hill-dark: #4a8d11;
        --window: #ece9d8;
        --window-dark: #d4d0c8;
        --window-line: #808080;
        --title-start: #0a2f92;
        --title-end: #2f6be8;
        --title-inactive: #7c7c7c;
        --text: #000000;
        --taskbar: #d4d0c8;
        --taskbar-line: #8f8b84;
        --button-face: #d4d0c8;
        --button-highlight: #ffffff;
        --button-shadow: #808080;
        --button-dark-shadow: #404040;
        --desktop-text: #ffffff;
        --selection: rgba(10, 47, 146, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--text);
        font-family: Tahoma, "MS Sans Serif", Verdana, sans-serif;
        font-size: 12px;
        background: #000 url("assets/images/desktop-wallpaper.jpg") center center / cover no-repeat fixed;
      }

      button,
      input {
        font: inherit;
      }

      .desktop {
        position: fixed;
        inset: 0;
        padding: 10px 10px 42px;
      }

      .desktop-icons {
        position: relative;
        width: 100%;
        height: calc(100vh - 52px);
      }

      .desktop-icon {
        position: absolute;
        width: 106px;
        border: 1px solid transparent;
        background: transparent;
        color: var(--desktop-text);
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 4px;
        padding: 4px 2px;
        text-align: center;
        cursor: default;
      }

      .desktop-icon.selected {
        background: var(--selection);
        border-color: rgba(255, 255, 255, 0.45);
      }

      .desktop-icon.preselected {
        background: var(--selection);
        border-color: rgba(255, 255, 255, 0.45);
      }

      .desktop-icon:focus-visible {
        outline: 1px dotted #fff;
        outline-offset: -3px;
      }

      .icon-label {
        max-width: 102px;
        line-height: 1.1;
        text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.65);
        font-size: 13px;
      }

      .icon-art {
        position: relative;
        width: 47px;
        height: 42px;
      }

      .icon-art.folder::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 5px;
        width: 18px;
        height: 10px;
        background: #f5df6f;
        border: 1px solid #806400;
        border-bottom: 0;
      }

      .icon-art.folder::after {
        content: "";
        position: absolute;
        inset: 12px 1px 1px 1px;
        background: linear-gradient(180deg, #fde89a 0%, #d8af20 100%);
        border: 1px solid #806400;
        border-radius: 1px;
      }

      .icon-art.file::before {
        content: "";
        position: absolute;
        inset: 1px 9px 1px 9px;
        background: #fff;
        border: 1px solid #666;
        box-shadow: inset 0 -10px 0 #d6ecff;
      }

      .icon-art.file::after {
        content: "";
        position: absolute;
        right: 10px;
        top: 1px;
        border-left: 10px solid transparent;
        border-bottom: 10px solid #d6ecff;
      }

      .icon-art.contact::before {
        content: "";
        position: absolute;
        inset: 5px 5px auto 5px;
        height: 29px;
        background: #f3f3f3;
        border: 1px solid #666;
      }

      .icon-art.contact::after {
        content: "@";
        position: absolute;
        inset: 11px 0 0 0;
        text-align: center;
        font-weight: 700;
        color: #1b4e9b;
        font-size: 16px;
      }

      .icon-art.app::before {
        content: "";
        position: absolute;
        inset: 2px 5px 9px 5px;
        background: linear-gradient(180deg, #b8d0ff 0%, #3870d8 100%);
        border: 1px solid #163f87;
      }

      .icon-art.app::after {
        content: "";
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 2px;
        height: 5px;
        background: #d4d0c8;
        border: 1px solid #666;
      }

      .icon-art.zip::before {
        content: "";
        position: absolute;
        inset: 4px 9px 4px 9px;
        background: #fff4b0;
        border: 1px solid #8f7a00;
      }

      .icon-art.zip::after {
        content: "";
        position: absolute;
        left: 21px;
        top: 4px;
        bottom: 4px;
        width: 4px;
        background: #7a7a7a;
      }

      .window-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .window {
        position: absolute;
        min-width: 320px;
        min-height: 220px;
        background: var(--window);
        border: 1px solid var(--window-line);
        box-shadow:
          inset 1px 1px 0 var(--button-highlight),
          inset -1px -1px 0 var(--button-dark-shadow);
        pointer-events: auto;
      }

      .window.hidden {
        display: none;
      }

      .titlebar {
        height: 28px;
        padding: 3px 3px 3px 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: linear-gradient(90deg, var(--title-start), var(--title-end));
        color: #fff;
        cursor: move;
        user-select: none;
      }

      .window.inactive .titlebar {
        background: linear-gradient(90deg, var(--title-inactive), #b0b0b0);
      }

      .titlebar-left {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .titlebar-text {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-weight: 700;
      }

      .titlebar-icon {
        width: 16px;
        height: 16px;
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.55);
      }

      .window-controls {
        display: flex;
        gap: 2px;
      }

      .win-btn {
        width: 22px;
        height: 20px;
        border: 1px solid var(--button-dark-shadow);
        border-top-color: var(--button-highlight);
        border-left-color: var(--button-highlight);
        background: var(--button-face);
        padding: 0;
        display: grid;
        place-items: center;
        cursor: default;
      }

      .win-btn span {
        display: block;
        width: 10px;
        height: 10px;
        border-top: 2px solid #000;
      }

      .win-btn.close span {
        border: 0;
        position: relative;
      }

      .win-btn.close span::before,
      .win-btn.close span::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 0;
        width: 2px;
        height: 10px;
        background: #000;
      }

      .win-btn.close span::before { transform: rotate(45deg); }
      .win-btn.close span::after { transform: rotate(-45deg); }

      .window-body {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        height: calc(100% - 28px);
      }

      .menubar,
      .toolbar,
      .statusbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 4px 8px;
        background: var(--window);
        border-bottom: 1px solid #c7c7c7;
      }

      .statusbar {
        border-top: 1px solid #c7c7c7;
        border-bottom: 0;
        justify-content: space-between;
      }

      .toolbar {
        gap: 6px;
      }

      .tool-btn,
      .address-box,
      .sidebar-panel {
        border: 1px solid #7f9db9;
        background: #fff;
      }

      .tool-btn {
        min-width: 48px;
        padding: 2px 6px;
        text-align: center;
      }

      .address-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        border-bottom: 1px solid #c7c7c7;
      }

      .address-box {
        flex: 1;
        padding: 3px 6px;
        min-height: 24px;
      }

      .explorer {
        display: grid;
        grid-template-columns: 184px minmax(0, 1fr);
        min-height: 0;
        height: 100%;
      }

      .sidebar {
        padding: 8px;
        border-right: 1px solid #c7c7c7;
        background: #f1f1f1;
      }

      .sidebar-panel {
        padding: 8px;
        min-height: 140px;
      }

      .sidebar-preview {
        width: 48px;
        height: 42px;
        margin-bottom: 12px;
        position: relative;
        background: linear-gradient(180deg, #fde89a 0%, #d8af20 100%);
        border: 1px solid #806400;
      }

      .sidebar-preview::before {
        content: "";
        position: absolute;
        left: 2px;
        top: -6px;
        width: 16px;
        height: 8px;
        background: #f5df6f;
        border: 1px solid #806400;
        border-bottom: 0;
      }

      .sidebar-panel h3 {
        margin: 0 0 6px;
        font-size: 13px;
      }

      .folder-content {
        background: #fff;
        padding: 10px;
        overflow: auto;
      }

      .file-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 14px 10px;
        align-content: start;
      }

      .file-item {
        border: 1px solid transparent;
        background: transparent;
        display: grid;
        justify-items: center;
        gap: 6px;
        padding: 6px 4px;
        text-align: center;
        cursor: default;
      }

      .file-item.selected {
        background: #316ac5;
        border-color: #316ac5;
        color: #fff;
      }

      .thumb {
        width: 76px;
        height: 62px;
        object-fit: cover;
        border: 1px solid #808080;
        background: #fff;
      }

      .thumb-placeholder {
        width: 76px;
        height: 62px;
        border: 1px solid #808080;
        background: linear-gradient(180deg, #ffffff 0%, #ece9d8 100%);
        position: relative;
      }

      .thumb-placeholder.folder::before,
      .thumb-placeholder.folder::after,
      .thumb-placeholder.file::before,
      .thumb-placeholder.file::after,
      .thumb-placeholder.app::before,
      .thumb-placeholder.app::after,
      .thumb-placeholder.zip::before,
      .thumb-placeholder.zip::after {
        content: "";
        position: absolute;
      }

      .thumb-placeholder.folder::before {
        left: 12px;
        top: 15px;
        width: 20px;
        height: 10px;
        background: #f5df6f;
        border: 1px solid #806400;
        border-bottom: 0;
      }

      .thumb-placeholder.folder::after {
        left: 10px;
        right: 10px;
        top: 24px;
        bottom: 12px;
        background: linear-gradient(180deg, #fde89a 0%, #d8af20 100%);
        border: 1px solid #806400;
      }

      .thumb-placeholder.file::before {
        inset: 8px 20px 8px 20px;
        background: #fff;
        border: 1px solid #666;
        box-shadow: inset 0 -12px 0 #d6ecff;
      }

      .thumb-placeholder.file::after {
        right: 20px;
        top: 8px;
        border-left: 12px solid transparent;
        border-bottom: 12px solid #d6ecff;
      }

      .thumb-placeholder.app::before {
        inset: 10px 14px 18px 14px;
        background: linear-gradient(180deg, #b8d0ff 0%, #3870d8 100%);
        border: 1px solid #163f87;
      }

      .thumb-placeholder.app::after {
        left: 22px;
        right: 22px;
        bottom: 10px;
        height: 6px;
        background: #d4d0c8;
        border: 1px solid #666;
      }

      .thumb-placeholder.zip::before {
        inset: 10px 20px;
        background: #fff4b0;
        border: 1px solid #8f7a00;
      }

      .thumb-placeholder.zip::after {
        left: 35px;
        top: 10px;
        bottom: 10px;
        width: 5px;
        background: #7a7a7a;
      }

      .viewer-body {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: calc(100% - 28px);
      }

      .viewer-toolbar {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 8px;
        border-bottom: 1px solid #c7c7c7;
      }

      .viewer-stage {
        background: #3f3f3f;
        display: grid;
        place-items: center;
        padding: 10px;
        overflow: auto;
      }

      .viewer-stage img {
        display: block;
        max-width: 100%;
        max-height: 60vh;
        width: auto;
        height: auto;
        border: 1px solid #000;
        background: #fff;
      }

      .contact-panel {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .contact-panel a {
        width: fit-content;
        color: #003399;
      }

      .error-body {
        padding: 16px 14px 12px;
        display: grid;
        gap: 16px;
      }

      .error-row {
        display: grid;
        grid-template-columns: 36px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      .error-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #cc0000;
        color: #cc0000;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 18px;
      }

      .error-actions {
        display: flex;
        justify-content: center;
      }

      .system-btn {
        min-width: 78px;
        padding: 4px 10px;
        border: 1px solid var(--button-dark-shadow);
        border-top-color: var(--button-highlight);
        border-left-color: var(--button-highlight);
        background: var(--button-face);
      }

      .taskbar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 34px;
        display: flex;
        align-items: stretch;
        gap: 6px;
        padding: 3px 4px;
        background: var(--taskbar);
        border-top: 1px solid var(--button-highlight);
      }

      .start-btn,
      .task-btn,
      .tray {
        border: 1px solid var(--button-dark-shadow);
        border-top-color: var(--button-highlight);
        border-left-color: var(--button-highlight);
        background: var(--button-face);
        display: flex;
        align-items: center;
      }

      .start-btn {
        padding: 0 12px;
        font-weight: 700;
      }

      .task-buttons {
        flex: 1;
        display: flex;
        gap: 4px;
        min-width: 0;
      }

      .task-btn {
        min-width: 160px;
        max-width: 220px;
        padding: 0 10px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .task-btn.inactive {
        background: #c6c3bb;
      }

      .tray {
        padding: 0 10px;
        gap: 12px;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .desktop {
          position: relative;
          min-height: 100vh;
          padding: 14px 12px 64px;
        }

        .desktop-icons {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 14px 8px;
          height: auto;
          min-height: calc(100vh - 120px);
          align-content: start;
        }

        .window-layer {
          position: relative;
          display: grid;
          gap: 12px;
          margin-top: 16px;
          pointer-events: auto;
        }

        .window {
          position: relative !important;
          top: auto !important;
          left: auto !important;
          right: auto !important;
          bottom: auto !important;
          width: 100% !important;
          min-width: 0;
          min-height: 0;
        }

        .desktop-icon {
          position: relative;
          left: auto !important;
          top: auto !important;
          width: 100%;
          min-height: 88px;
          justify-self: center;
        }

        .icon-label {
          max-width: 88px;
          font-size: 12px;
        }

        .taskbar {
          gap: 6px;
          padding: 2px 4px;
        }

        .start-btn {
          min-width: 64px;
          padding-inline: 10px;
        }

        .task-buttons {
          min-width: 0;
          overflow-x: auto;
          scrollbar-width: none;
        }

        .task-buttons::-webkit-scrollbar {
          display: none;
        }

        .tray {
          padding: 0 4px;
          gap: 6px;
        }

        .viewer-stage img {
          max-height: 50vh;
        }

        .task-btn {
          min-width: 88px;
        }
      }

      @media (max-width: 560px) {
        .desktop-icons {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .window-body {
          padding: 8px;
        }

        .folder-layout {
          grid-template-columns: 1fr;
        }

        .folder-sidebar {
          min-height: 72px;
        }
      }
    </style>
  </head>
  <body>

    </div>

      function syncTaskbar() {

          .forEach((entry) => {
            if (!entry.open) return;
            const btn = document.createElement("button");
            btn.className = `task-btn ${entry.element.classList.contains("inactive") ? "inactive" : ""}`;
            btn.textContent = entry.title;
            btn.addEventListener("click", () => {
              if (entry.element.classList.contains("hidden")) {
                entry.element.classList.remove("hidden");
              }
              bringToFront(entry.id);
            });
            taskButtons.appendChild(btn);

      function makeWindowDraggable(element, handle, id) {
        let startX = 0;
        let startY = 0;
        let initialX = 0;
        let initialY = 0;
        let dragging = false;

        handle.addEventListener("mousedown", (event) => {
          if (window.innerWidth <= 900) return;
          dragging = true;
          bringToFront(id);
          startX = event.clientX;
          startY = event.clientY;
          initialX = element.offsetLeft;
          initialY = element.offsetTop;
          event.preventDefault();
        });

        window.addEventListener("mousemove", (event) => {
          if (!dragging) return;
          element.style.left = `${Math.max(0, initialX + event.clientX - startX)}px`;
          element.style.top = `${Math.max(0, initialY + event.clientY - startY)}px`;
        });

        window.addEventListener("mouseup", () => {
          dragging = false;
        });
      }

        return { windowEl, titlebar };

          existing.open = true;
          bringToFront(id);
          syncTaskbar();
          return;
        }

        const { windowEl } = createBaseWindow(id, "Contact", 220, 90, 420, 250);
        const panel = document.createElement("div");
        panel.className = "contact-panel";
        panel.innerHTML = `
          <div><strong>UNGADRAKEN</strong></div>
          <a href="mailto:ungadraken@gmail.com">ungadraken@gmail.com</a>
          <a href="https://www.instagram.com/ungadrakenstudios/" target="_blank" rel="noreferrer">@ungadrakenstudios</a>
        `;
        windowEl.appendChild(panel);

        state.windows.set(id, {
          id,
          title: "Contact",
          element: windowEl,
          open: true
        });
        bringToFront(id);
        syncTaskbar();
      }

      function closeWindow(id) {
        const entry = state.windows.get(id);
        if (!entry) return;
        entry.element.classList.add("hidden");
        entry.open = false;
        syncTaskbar();
      }

      function updateClock() {
        const now = new Date();
        const formatted = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        document.getElementById("clock").textContent = formatted;
      }

      function openError(title, message) {
        const id = "system:error";
        const existing = state.windows.get(id);
        if (existing) {
          existing.element.classList.remove("hidden");
          existing.element.querySelector(".titlebar-text").textContent = `${title} Error`;
          existing.element.querySelector(".error-message").textContent = message;
          existing.open = true;
          bringToFront(id);
          syncTaskbar();
          return;
        }

        const { windowEl } = createBaseWindow(id, `${title} Error`, 300, 160, 360, 180);
        const body = document.createElement("div");
        body.className = "error-body";
        body.innerHTML = `
          <div class="error-row">
            <div class="error-icon">!</div>
            <div class="error-message">${message}</div>
          </div>
          <div class="error-actions">
            <button class="system-btn" type="button">OK</button>
          </div>
        `;
        body.querySelector(".system-btn").addEventListener("click", () => closeWindow(id));
        windowEl.appendChild(body);

        state.windows.set(id, {
          id,
          title: `${title} Error`,
          element: windowEl,
          open: true
        });
        bringToFront(id);
        syncTaskbar();
      }

      folders.forEach(createDesktopIcon);
      updateClock();
      setInterval(updateClock, 1000);

      startBtn.addEventListener("click", () => openError("Start Menu", "The Start menu is unavailable in this build."));
      langBtn.addEventListener("click", () => openError("Language", "Language options could not be loaded."));
      clockBtn.addEventListener("click", () => openError("Clock", "Date and Time Properties are not installed."));

      document.body.addEventListener("click", (event) => {
        if (!event.target.closest(".desktop-icon") && !event.target.closest(".window")) {
          selectDesktopIcon(null);
        }
      });
    </script>
  </body>
</html>
